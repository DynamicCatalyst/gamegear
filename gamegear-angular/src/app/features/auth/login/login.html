<div class="container mt-5" style="max-width: 460px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h2 class="h4 mb-3 text-center">Sign In</h2>

      @if (errorMessage()) {
        <div class="alert alert-danger py-2" role="alert">{{ errorMessage() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="mb-3">
          <label class="form-label" for="email">Email</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input id="email" type="email" class="form-control" formControlName="email"
                   autocomplete="email"
                   [class.is-invalid]="form.controls.email.invalid && form.controls.email.touched" />
          </div>
          @if (form.controls.email.invalid && form.controls.email.touched) {
            <div class="text-danger small mt-1">Enter a valid email.</div>
          }
        </div>

        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input id="password" type="password" class="form-control" formControlName="password"
                   autocomplete="current-password"
                   [class.is-invalid]="form.controls.password.invalid && form.controls.password.touched" />
          </div>
          @if (form.controls.password.invalid && form.controls.password.touched) {
            <div class="text-danger small mt-1">Password is required.</div>
          }
        </div>

        <button type="submit" class="btn btn-primary w-100" [disabled]="submitting()">
          @if (submitting()) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Sign In
        </button>
      </form>

      <p class="text-center mt-3 mb-0">
        No account? <a routerLink="/register">Register</a>
      </p>
    </div>
  </div>
</div>
