<div class="container mt-5" style="max-width: 720px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h2 class="h4 mb-3 text-center">Create Account</h2>

      @if (errorMessage()) {
        <div class="alert alert-danger py-2" role="alert">{{ errorMessage() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
        <div class="row g-2">
          <div class="col-md-6">
            <label class="form-label" for="firstName">First name</label>
            <input id="firstName" type="text" class="form-control" formControlName="firstName"
                   [class.is-invalid]="form.controls.firstName.invalid && form.controls.firstName.touched" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="lastName">Last name</label>
            <input id="lastName" type="text" class="form-control" formControlName="lastName"
                   [class.is-invalid]="form.controls.lastName.invalid && form.controls.lastName.touched" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="email">Email</label>
            <input id="email" type="email" class="form-control" formControlName="email"
                   autocomplete="email"
                   [class.is-invalid]="form.controls.email.invalid && form.controls.email.touched" />
          </div>
          <div class="col-md-6">
            <label class="form-label" for="password">Password</label>
            <input id="password" type="password" class="form-control" formControlName="password"
                   autocomplete="new-password"
                   [class.is-invalid]="form.controls.password.invalid && form.controls.password.touched" />
          </div>
        </div>

        <hr class="my-4" />

        <div class="d-flex justify-content-between align-items-center mb-2">
          <h3 class="h6 mb-0">Addresses</h3>
          <button type="button" class="btn btn-outline-secondary btn-sm" (click)="addAddress()">
            <i class="bi bi-plus"></i> Add address
          </button>
        </div>

        <div formArrayName="addressList">
          @for (group of addressList.controls; track $index) {
            <div class="border rounded p-3 mb-2" [formGroupName]="$index">
              <div class="row g-2">
                <div class="col-12">
                  <input type="text" class="form-control" placeholder="Street"
                         formControlName="street" aria-label="Street" />
                </div>
                <div class="col-md-6">
                  <input type="text" class="form-control" placeholder="City"
                         formControlName="city" aria-label="City" />
                </div>
                <div class="col-md-6">
                  <input type="text" class="form-control" placeholder="State"
                         formControlName="state" aria-label="State" />
                </div>
                <div class="col-md-6">
                  <input type="text" class="form-control" placeholder="Country"
                         formControlName="country" aria-label="Country" />
                </div>
                <div class="col-md-6">
                  <input type="text" class="form-control" placeholder="Phone number"
                         formControlName="phoneNumber" aria-label="Phone number" />
                </div>
                <div class="col-md-6">
                  <select class="form-select" formControlName="addressType" aria-label="Address type">
                    <option value="HOME">Home</option>
                    <option value="WORK">Work</option>
                    <option value="BILLING">Billing</option>
                    <option value="SHIPPING">Shipping</option>
                  </select>
                </div>
              </div>
              @if (addressList.length > 1) {
                <button type="button" class="btn btn-outline-danger btn-sm mt-2"
                        (click)="removeAddress($index)">
                  <i class="bi bi-trash"></i> Remove
                </button>
              }
            </div>
          }
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3" [disabled]="submitting()">
          @if (submitting()) {
            <span class="spinner-border spinner-border-sm me-2"></span>
          }
          Register
        </button>
      </form>

      <p class="text-center mt-3 mb-0">
        Already have an account? <a routerLink="/login">Sign in</a>
      </p>
    </div>
  </div>
</div>
