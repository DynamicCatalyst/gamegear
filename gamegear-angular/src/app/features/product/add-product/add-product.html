<div class="container mt-4" style="max-width: 720px;">
  <h1 class="h3 mb-3">Add Product</h1>

  <!-- Step indicator -->
  <div class="d-flex align-items-center mb-4">
    <span class="badge rounded-pill" [class.bg-primary]="step() === 1"
          [class.bg-secondary]="step() !== 1">1</span>
    <span class="ms-2 me-3">Details</span>
    <span class="flex-grow-1 border-top"></span>
    <span class="badge rounded-pill ms-3" [class.bg-primary]="step() === 2"
          [class.bg-secondary]="step() !== 2">2</span>
    <span class="ms-2">Images</span>
  </div>

  @if (step() === 1) {
    <div class="card shadow-sm">
      <div class="card-body">
        <form [formGroup]="form" (ngSubmit)="saveDetails()" novalidate>
          <div class="mb-3">
            <label class="form-label" for="name">Product name</label>
            <input id="name" type="text" class="form-control" formControlName="name"
                   [class.is-invalid]="form.controls.name.invalid && form.controls.name.touched" />
          </div>

          <div class="row g-2">
            <div class="col-md-6 mb-3">
              <label class="form-label" for="price">Price</label>
              <input id="price" type="number" step="0.01" class="form-control" formControlName="price"
                     [class.is-invalid]="form.controls.price.invalid && form.controls.price.touched" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label" for="inventory">Inventory</label>
              <input id="inventory" type="number" class="form-control" formControlName="inventory"
                     [class.is-invalid]="form.controls.inventory.invalid && form.controls.inventory.touched" />
            </div>
          </div>

          <app-brand-selector [(selectedBrand)]="brand" />
          <app-category-selector [(selectedCategory)]="category" />

          <div class="mb-3">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" rows="3" class="form-control"
                      formControlName="description"></textarea>
          </div>

          <button type="submit" class="btn btn-primary" [disabled]="submitting()">
            @if (submitting()) {
              <span class="spinner-border spinner-border-sm me-2"></span>
            }
            Save & continue
          </button>
        </form>
      </div>
    </div>
  } @else {
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="h5">Add images for "{{ createdProduct()?.name }}"</h2>
        @if (createdProduct(); as product) {
          <app-image-uploader [productId]="product.id" />
        }
        <button type="button" class="btn btn-success mt-3" (click)="finish()">
          Finish
        </button>
      </div>
    </div>
  }
</div>
