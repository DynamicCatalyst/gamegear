server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Allow product image uploads (backend caps multipart at 5MB).
  client_max_body_size 10M;

  # Proxy API calls to the backend container so the browser talks to one origin.
  location /api/ {
    proxy_pass http://backend:8081/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # SPA fallback: Angular handles client-side routes, so unknown paths
  # (e.g. /product/11/details on a hard refresh) must return index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
