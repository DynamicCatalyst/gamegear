# Test profile (@ActiveProfiles("test")). Layered ON TOP of application.properties,
# so it only swaps the datasource to in-memory H2 — the app runs on PostgreSQL.
# Keeps the test suite self-contained (no running Postgres needed).
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=false
