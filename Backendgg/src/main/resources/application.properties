spring.application.name=gamegear

# ===== Server =====
server.port=8081

#server.ssl.key-store=keystore.p12
#server.ssl.key-store-password=${KEY_PASS}
#server.ssl.key-store-type=pkcs12
#server.ssl.key-alias=backend
#server.ssl.key-password=${KEY_PASS}

# ===== Database: PostgreSQL =====
# docker-compose sets SPRING_DATASOURCE_* to point at the db container; for
# local runs without Docker these fall back to a localhost Postgres.
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/gamegear}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Root}

spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.max-file-size=5MB


api.prefix=/api/v1
app.useSecureCookie = false

### 2 minutes
#auth.token.accessExpirationInMils=120000
### 5 minutes
#auth.token.refreshExpirationInMils=300000


#
#5 minutes
auth.token.accessExpirationInMils=300000
# 30 days
auth.token.refreshExpirationInMils=2592000000

# JWT signing secret, read from JWT_SECRET; falls back to a dev default when unset.
auth.token.jwtSecret=${JWT_SECRET:Pg4s9Vtt18K6ZNgwUCLMIxp8SrL7pXt1tDEpXvFI42VRLKeLZxcOur0zhPF4084R}


####stripe payment####
# Stripe secret key, read from STRIPE_SECRET_KEY. Only used during checkout.
stripe.secret.key =${STRIPE_SECRET_KEY:}

## ===== OpenAI / Chroma (AI image search) =====
# Keys read from env vars; empty by default. The image-search beans are created
# lazily and aren't contacted at startup, so the app boots fine without them.
spring.ai.openai.api-key =${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini

spring.ai.vectorstore.chroma.client.host=https://api.trychroma.com
spring.ai.vectorstore.chroma.client.key-token=${CHROMA_KEY_TOKEN:}
spring.ai.vectorstore.chroma.initialize-schema=false
spring.ai.vectorstore.chroma.collection-name=image_collection
spring.ai.vectorstore.chroma.database-name=gamegearchromadb
spring.ai.vectorstore.chroma.tenant-name=${CHROMA_TENANT:607e38f9-8684-4bf9-a5eb-592a17f71dcc}
