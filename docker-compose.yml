# Brings up the whole stack with: docker compose up --build
# db = PostgreSQL 16, backend = Spring Boot, frontend = Angular served by nginx (port 80).
# Only the frontend is published to the host; db and backend stay on the internal network.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: gamegear
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Root}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gamegear"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./Backendgg
    # Secrets come from Backendgg/.env at runtime (copy .env.example to .env).
    env_file:
      - ./Backendgg/.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gamegear
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-Root}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./gamegear-angular
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
